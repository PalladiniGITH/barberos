name: Security

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  audit-and-security-tests:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/barberex_test
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: test-nextauth-secret
      PUBLIC_APP_URL: http://localhost:3000
      EVOLUTION_WEBHOOK_SECRET: test-evolution-secret
      UPLOAD_STORAGE_DRIVER: local
      UPLOAD_PUBLIC_BASE_URL: /uploads
      UPLOAD_LOCAL_DIR: /tmp/barberex-uploads
      OPENAI_API_KEY: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security tests
        run: npm run security:test

      - name: Run dependency audit
        run: npm run security:audit
