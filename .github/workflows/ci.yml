name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/barberex_test
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: test-nextauth-secret
      PUBLIC_APP_URL: http://localhost:3000
      EVOLUTION_WEBHOOK_SECRET: test-evolution-secret
      UPLOAD_STORAGE_DRIVER: local
      UPLOAD_PUBLIC_BASE_URL: /uploads
      UPLOAD_LOCAL_DIR: /tmp/barberex-uploads
      OPENAI_API_KEY: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run WhatsApp test suite
        run: npm run test:whatsapp

      - name: Run security test suite
        run: npm run security:test
